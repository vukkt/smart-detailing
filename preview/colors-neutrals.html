<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sd-bg);}
  .card{padding:24px 28px;box-sizing:border-box;}
  .row{display:flex;gap:8px;}
  .sw{flex:1 1 0;min-height:90px;border-radius:var(--sd-radius-md);padding:10px 12px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.06);}
  .sw .n{font-family:var(--sd-font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.08em;}
  .sw .h{font-family:var(--sd-font-mono);font-size:10px;opacity:0.6;}
  h3.title{font-family:var(--sd-font-sans);font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:var(--sd-fg-subtle);margin:0 0 14px;font-weight:600;}
</style></head><body class="sd-root"><div class="card">
<h3 class="title">Neutrals · Ink Scale</h3>
<div class="row">
  <div class="sw" style="background:#0A0C0F;color:#E8EAEE"><span class="n">Ink 950</span><span class="h">#0A0C0F</span></div>
  <div class="sw" style="background:#111418;color:#E8EAEE"><span class="n">Ink 900</span><span class="h">#111418</span></div>
  <div class="sw" style="background:#1A1E24;color:#E8EAEE"><span class="n">Ink 800</span><span class="h">#1A1E24</span></div>
  <div class="sw" style="background:#262B33;color:#E8EAEE"><span class="n">Ink 700</span><span class="h">#262B33</span></div>
  <div class="sw" style="background:#3A414C;color:#E8EAEE"><span class="n">Ink 600</span><span class="h">#3A414C</span></div>
  <div class="sw" style="background:#525A66;color:#E8EAEE"><span class="n">Ink 500</span><span class="h">#525A66</span></div>
  <div class="sw" style="background:#7A828F;color:#0A0C0F"><span class="n">Ink 400</span><span class="h">#7A828F</span></div>
  <div class="sw" style="background:#A8AEB8;color:#0A0C0F"><span class="n">Ink 300</span><span class="h">#A8AEB8</span></div>
  <div class="sw" style="background:#CFD3DA;color:#0A0C0F"><span class="n">Ink 200</span><span class="h">#CFD3DA</span></div>
  <div class="sw" style="background:#E8EAEE;color:#0A0C0F"><span class="n">Ink 100</span><span class="h">#E8EAEE</span></div>
</div>
</div></body></html>
