<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sd-bg);}
  .card{padding:32px;box-sizing:border-box;}
  h3.title{font-family:var(--sd-font-sans);font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:var(--sd-fg-subtle);margin:0 0 20px;font-weight:600;}
  .row{display:flex;gap:28px;align-items:flex-end;}
  .spec{display:flex;flex-direction:column;align-items:center;gap:14px;}
  .b{background:#1A1E24;width:120px;height:72px;border-radius:4px;}
  .t{font-family:var(--sd-font-mono);font-size:10px;color:var(--sd-fg-subtle);text-transform:uppercase;letter-spacing:0.08em;}
</style></head><body class="sd-root"><div class="card">
<h3 class="title">Elevation · Shadow System</h3>
<div class="row">
  <div class="spec"><div class="b" style="box-shadow:0 1px 2px rgba(0,0,0,0.4)"></div><span class="t">sm · buttons</span></div>
  <div class="spec"><div class="b" style="box-shadow:0 6px 18px rgba(0,0,0,0.45)"></div><span class="t">md · cards</span></div>
  <div class="spec"><div class="b" style="box-shadow:0 18px 48px rgba(0,0,0,0.55)"></div><span class="t">lg · modals</span></div>
  <div class="spec"><div class="b" style="box-shadow:0 0 0 1px rgba(227,164,8,0.35),0 12px 36px rgba(227,164,8,0.18)"></div><span class="t">glow · focused</span></div>
</div>
</div></body></html>
