<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sd-bg);}
  .card{padding:24px 28px;box-sizing:border-box;}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  .sw{min-height:72px;border-radius:var(--sd-radius-md);padding:10px 12px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.08);}
  .sw .n{font-family:var(--sd-font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.08em;}
  .sw .h{font-family:var(--sd-font-mono);font-size:10px;opacity:0.7;}
  .sw .r{font-family:var(--sd-font-sans);font-size:10px;opacity:0.7;text-transform:uppercase;letter-spacing:0.1em;}
  h3.title{font-family:var(--sd-font-sans);font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:var(--sd-fg-subtle);margin:0 0 14px;font-weight:600;}
</style></head><body class="sd-root"><div class="card">
<h3 class="title">Semantic Tokens · What maps where</h3>
<div class="grid">
  <div class="sw" style="background:#0A0C0F"><span class="n">--sd-bg</span><span class="r">page</span><span class="h">Ink 950</span></div>
  <div class="sw" style="background:#111418"><span class="n">--sd-bg-elevated</span><span class="r">sections</span><span class="h">Ink 900</span></div>
  <div class="sw" style="background:#1A1E24"><span class="n">--sd-surface</span><span class="r">cards</span><span class="h">Ink 800</span></div>
  <div class="sw" style="background:#262B33"><span class="n">--sd-surface-hover</span><span class="r">hover</span><span class="h">Ink 700</span></div>
  <div class="sw" style="background:#3A414C"><span class="n">--sd-border-strong</span><span class="r">border</span><span class="h">Ink 600</span></div>
  <div class="sw" style="background:#E3A408;color:#0A0C0F"><span class="n">--sd-accent</span><span class="r">CTA</span><span class="h">Gold 500</span></div>
  <div class="sw" style="background:#1A1E24"><span class="n" style="color:#E8EAEE">--sd-fg</span><span class="r">heading</span><span class="h" style="color:#E8EAEE">Ink 100</span></div>
  <div class="sw" style="background:#1A1E24"><span class="n" style="color:#A8AEB8">--sd-fg-muted</span><span class="r">body</span><span class="h" style="color:#A8AEB8">Ink 300</span></div>
  <div class="sw" style="background:#1A1E24"><span class="n" style="color:#7A828F">--sd-fg-subtle</span><span class="r">meta</span><span class="h" style="color:#7A828F">Ink 400</span></div>
  <div class="sw" style="background:#1A1E24"><span class="n" style="color:#4ADE80">--sd-success</span><span class="r">success</span><span class="h" style="color:#4ADE80">#4ADE80</span></div>
</div>
</div></body></html>
