<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sd-bg);}
  .card{padding:28px 32px;box-sizing:border-box;}
  h3.title{font-family:var(--sd-font-sans);font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:var(--sd-fg-subtle);margin:0 0 16px;font-weight:600;}
  .row{display:flex;gap:24px;align-items:flex-end;}
  .spec{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .b{background:#1A1E24;border:1px solid #3A414C;width:80px;height:56px;}
  .t{font-family:var(--sd-font-mono);font-size:10px;color:var(--sd-fg-subtle);text-transform:uppercase;letter-spacing:0.08em;}
</style></head><body class="sd-root"><div class="card">
<h3 class="title">Radius · Sharp by Default</h3>
<div class="row">
  <div class="spec"><div class="b" style="border-radius:0"></div><span class="t">none · 0</span></div>
  <div class="spec"><div class="b" style="border-radius:2px"></div><span class="t">sm · 2</span></div>
  <div class="spec"><div class="b" style="border-radius:4px"></div><span class="t">md · 4</span></div>
  <div class="spec"><div class="b" style="border-radius:8px"></div><span class="t">lg · 8</span></div>
  <div class="spec"><div class="b" style="border-radius:14px"></div><span class="t">xl · 14</span></div>
  <div class="spec"><div class="b" style="border-radius:999px;width:96px"></div><span class="t">pill</span></div>
</div>
<p style="font-family:var(--sd-font-sans);font-size:12px;color:var(--sd-fg-subtle);margin-top:16px;">Default to <b style="color:var(--sd-fg)">sm</b>/<b style="color:var(--sd-fg)">md</b>. Pill is reserved for chip/tag filters. The brand is mechanical — sharp edges convey precision.</p>
</div></body></html>
