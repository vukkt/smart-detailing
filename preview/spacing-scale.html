<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sd-bg);}
  .card{padding:28px 32px;box-sizing:border-box;}
  h3.title{font-family:var(--sd-font-sans);font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:var(--sd-fg-subtle);margin:0 0 16px;font-weight:600;}
  .row{display:flex;align-items:center;gap:18px;padding:6px 0;}
  .tok{font-family:var(--sd-font-mono);font-size:11px;color:var(--sd-fg-subtle);width:140px;flex-shrink:0;}
  .bar{background:var(--sd-accent);height:10px;border-radius:2px;}
  .val{font-family:var(--sd-font-mono);font-size:11px;color:var(--sd-fg-muted);}
</style></head><body class="sd-root"><div class="card">
<h3 class="title">Spacing · 4px Base Scale</h3>
<div class="row"><span class="tok">--sd-space-1</span><div class="bar" style="width:4px;"></div><span class="val">4</span></div>
<div class="row"><span class="tok">--sd-space-2</span><div class="bar" style="width:8px;"></div><span class="val">8</span></div>
<div class="row"><span class="tok">--sd-space-3</span><div class="bar" style="width:12px;"></div><span class="val">12</span></div>
<div class="row"><span class="tok">--sd-space-4</span><div class="bar" style="width:16px;"></div><span class="val">16</span></div>
<div class="row"><span class="tok">--sd-space-5</span><div class="bar" style="width:24px;"></div><span class="val">24</span></div>
<div class="row"><span class="tok">--sd-space-6</span><div class="bar" style="width:32px;"></div><span class="val">32</span></div>
<div class="row"><span class="tok">--sd-space-7</span><div class="bar" style="width:48px;"></div><span class="val">48</span></div>
<div class="row"><span class="tok">--sd-space-8</span><div class="bar" style="width:64px;"></div><span class="val">64</span></div>
<div class="row"><span class="tok">--sd-space-9</span><div class="bar" style="width:96px;"></div><span class="val">96</span></div>
<div class="row"><span class="tok">--sd-space-10</span><div class="bar" style="width:128px;"></div><span class="val">128</span></div>
</div></body></html>
