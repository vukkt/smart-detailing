<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sd-bg);}
  .card{padding:0;box-sizing:border-box;}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;background:#0A0C0F;border-bottom:1px solid #1A1E24;}
  .logo{display:flex;align-items:center;gap:12px;}
  .logo-mark{width:32px;height:32px;}
  .brand{font-family:var(--sd-font-display);font-size:18px;letter-spacing:0.08em;color:#E8EAEE;text-transform:uppercase;}
  .brand span{color:#E3A408;}
  .links{display:flex;gap:36px;}
  .links a{font-family:var(--sd-font-sans);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.18em;color:#A8AEB8;text-decoration:none;transition:color 220ms;}
  .links a.active{color:#E3A408;}
  .links a:hover{color:#E8EAEE;}
  .cta{font-family:var(--sd-font-sans);font-weight:600;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;padding:10px 18px;background:#E3A408;color:#0A0C0F;border-radius:2px;text-decoration:none;}
</style></head><body class="sd-root"><div class="card">
<div class="nav">
  <div class="logo"><img class="logo-mark" src="../assets/mark.svg" alt=""><span class="brand">Smart<span> Detailing</span></span></div>
  <div class="links">
    <a href="#" class="active">Gallery</a>
    <a href="#">Services</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>
  <a href="#" class="cta">Book Now</a>
</div>
</div></body></html>
