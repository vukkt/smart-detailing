<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sd-bg);}
  .card{padding:28px 32px;box-sizing:border-box;display:flex;gap:16px;}
  .thumb{flex:1;aspect-ratio:4/3;background-size:cover;background-position:center;border-radius:4px;overflow:hidden;position:relative;cursor:pointer;transition:transform 420ms cubic-bezier(0.22,1,0.36,1);}
  .thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,12,15,0) 50%,rgba(10,12,15,0.85) 100%);}
  .thumb .meta{position:absolute;bottom:10px;left:12px;right:12px;z-index:2;font-family:var(--sd-font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:#E8EAEE;display:flex;justify-content:space-between;}
  .thumb:hover{transform:scale(1.04);box-shadow:0 18px 40px rgba(0,0,0,0.55);}
  .t1{background-image:url('../assets/gallery/car1.jpg');}
  .t2{background-image:url('../assets/gallery/car2.jpg');}
  .t3{background-image:url('../assets/gallery/car3.jpg');}
</style></head><body class="sd-root"><div class="card">
<div class="thumb t1"><div class="meta"><span>Ceramic · 9H</span><span>01</span></div></div>
<div class="thumb t2"><div class="meta"><span>Paint Correction</span><span>02</span></div></div>
<div class="thumb t3"><div class="meta"><span>Full Detail</span><span>03</span></div></div>
</div></body></html>
