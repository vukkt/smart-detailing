<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sd-bg);}
  .card{padding:28px 32px;box-sizing:border-box;}
  h3.title{font-family:var(--sd-font-sans);font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:var(--sd-fg-subtle);margin:0 0 16px;font-weight:600;}
  .row{display:flex;align-items:baseline;gap:20px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
  .row:last-child{border-bottom:0;}
  .meta{font-family:var(--sd-font-mono);font-size:11px;color:var(--sd-fg-subtle);width:150px;flex-shrink:0;letter-spacing:0.02em;}
  .spec{line-height:1;}
</style></head><body class="sd-root"><div class="card">
<h3 class="title">Display · Anton</h3>
<div class="row"><span class="meta">Anton · 120/1.0</span><div class="spec" style="font-family:var(--sd-font-display);font-size:88px;letter-spacing:-0.01em;text-transform:uppercase;line-height:1;">Smart Detailing</div></div>
<div class="row"><span class="meta">Anton · 64/1.05</span><div class="spec" style="font-family:var(--sd-font-display);font-size:52px;letter-spacing:-0.01em;text-transform:uppercase;line-height:1.05;">Ceramic Coating</div></div>
<div class="row"><span class="meta">Anton · 36/1.05</span><div class="spec" style="font-family:var(--sd-font-display);font-size:34px;letter-spacing:-0.01em;text-transform:uppercase;line-height:1.05;">Interior Detail</div></div>
</div></body></html>
