<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sd-bg);}
  .card{padding:24px 28px;box-sizing:border-box;}
  .row{display:flex;gap:8px;margin-bottom:12px;}
  .sw{flex:1 1 0;min-height:84px;border-radius:var(--sd-radius-md);padding:10px 12px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.06);}
  .sw .n{font-family:var(--sd-font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.08em;}
  .sw .h{font-family:var(--sd-font-mono);font-size:10px;opacity:0.6;}
  h3.title{font-family:var(--sd-font-sans);font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:var(--sd-fg-subtle);margin:0 0 14px;font-weight:600;}
  .sub{font-family:var(--sd-font-sans);font-size:11px;color:var(--sd-fg-subtle);margin-top:10px;}
</style></head><body class="sd-root"><div class="card">
<h3 class="title">Accent · Gold (Trophy Finish)</h3>
<div class="row">
  <div class="sw" style="background:#3D2B00;color:#FFE9B0"><span class="n">Gold 900</span><span class="h">#3D2B00</span></div>
  <div class="sw" style="background:#8A6500;color:#FFE9B0"><span class="n">Gold 700</span><span class="h">#8A6500</span></div>
  <div class="sw" style="background:#E3A408;color:#0A0C0F"><span class="n">Gold 500 ◆</span><span class="h">#E3A408</span></div>
  <div class="sw" style="background:#F2B829;color:#0A0C0F"><span class="n">Gold 400</span><span class="h">#F2B829</span></div>
  <div class="sw" style="background:#F8CC5A;color:#0A0C0F"><span class="n">Gold 300</span><span class="h">#F8CC5A</span></div>
  <div class="sw" style="background:#FFE9B0;color:#0A0C0F"><span class="n">Gold 100</span><span class="h">#FFE9B0</span></div>
</div>
<div class="sub">◆ <b style="color:var(--sd-fg)">Gold 500</b> is the single brand accent. Used on CTAs, keylines, underlines, hover glows.</div>
</div></body></html>
